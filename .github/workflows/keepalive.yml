name: Keep Alive

on:
  schedule:
    # 1st and 21st of each month. Each run unconditionally resets both
    # workflows' 60-day inactivity timers, so worst-case exposure is
    # ~20 days plus cron delay — well inside GitHub's disable window.
    - cron: '0 0 1,21 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Reset scheduled-workflow inactivity timers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # PUT .../enable on an already-enabled workflow returns 204 and
          # resets GitHub's 60-day inactivity timer for that workflow.
          # Issue creation by a scheduled run does NOT count as repository
          # activity, so without this both crons die 60 days after the
          # last commit.
          for wf in create-session-issues.yml keepalive.yml; do
            curl -fsS -X PUT \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/${wf}/enable"
            echo "reset ${wf}"
          done
