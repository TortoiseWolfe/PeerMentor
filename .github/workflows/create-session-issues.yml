name: Create Wednesday Session Issues

on:
  schedule:
    # Two entries cover both EST (UTC-5) and EDT (UTC-4)
    # Only the one matching 3:45 PM ET will pass the hour check below
    - cron: '45 19 * * 3'   # 3:45 PM ET during EDT (Mar-Nov)
    - cron: '45 20 * * 3'   # 3:45 PM ET during EST (Nov-Mar)
  workflow_dispatch: # Allow manual trigger

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check Eastern Time hour
        id: tz_check
        run: |
          HOUR=$(TZ='America/New_York' date +%H)
          echo "eastern_hour=$HOUR" >> $GITHUB_OUTPUT
          if [ "$HOUR" = "15" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Get formatted date
        if: steps.tz_check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        id: date
        run: echo "date=$(TZ='America/New_York' date +'%B %d, %Y')" >> $GITHUB_OUTPUT

      - name: Create Peer Programming Issue
        if: steps.tz_check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Peer Programming Session - ${{ steps.date.outputs.date }}`,
              labels: ['session'],
              body: `## Start
            - [ ] Join the <a href="https://discord.com/channels/1246558669269762069/1246558669722882130" target="_blank">Voice channel</a>
            - [ ] Announce in <a href="https://discord.com/channels/1246558669269762069/1246558669722882129" target="_blank">TechJoy #general</a>:
            \`\`\`
            🎙️ Peer programming session starting now! Drop by the voice channel if you want to code together or have questions.
            https://discord.com/channels/1246558669269762069/1246558669722882130
            \`\`\`
            - [ ] Announce in <a href="https://discord.com/channels/728714241242169406/728714241242169409" target="_blank">Joy of Coding #general</a>:
            \`\`\`
            🎙️ Peer programming session live in TechJoy! Join us in the voice channel to code together or get help with your projects.
            https://discord.com/channels/1246558669269762069/1246558669722882130
            \`\`\`
            - [ ] Log into <a href="https://app.asana.com/1/1205445731086278/project/1206601659692567/board/1206601969654100" target="_blank">Asana → Discord @Help Questions</a>
            - [ ] Check in at <a href="https://discord.com/channels/728714241242169406/1171503496915333131" target="_blank">#peer-mentor-hub</a> (tag coordinator)

            ## During
            - [ ] Greet students, ask what they're working on
            - [ ] Guide with questions—don't give direct answers
            - [ ] If no students join, stay in channel & work on your own code
            - [ ] Can answer @help tickets if voice channel is quiet

            ## End
            - [ ] Post summary in <a href="https://discord.com/channels/728714241242169406/1171503496915333131" target="_blank">#peer-mentor-hub</a> (questions answered, attendance, patterns noticed)
            - [ ] Check out by tagging coordinator

            ---

            ### Session Notes
            _Add any notes, questions answered, or patterns noticed here_`
            });

      - name: Create Help Tickets Issue
        if: steps.tz_check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `@Help Tickets Session - ${{ steps.date.outputs.date }}`,
              labels: ['session'],
              body: `## Start
            - [ ] Check in at <a href="https://discord.com/channels/728714241242169406/1171503496915333131" target="_blank">#peer-mentor-hub</a>
            - [ ] Log into <a href="https://app.asana.com/1/1205445731086278/project/1206601659692567/board/1206601969654100" target="_blank">Asana → Discord @Help Questions</a>

            ## Process New Requests (bottom to top)
            - [ ] Read ticket → check Discord for updates/edits
            - [ ] **Already resolved** → congratulate, assign self, move to Done
            - [ ] **Needs admin** → respond with escalation message, assign to coordinator, tag in Discord
            - [ ] **You can help** → @mention student, guide (don't give full answers), assign self, move to In-Progress
            - [ ] **Unfamiliar topic** → comment that you looked but lack expertise, leave unassigned

            ## Check In-Progress
            - [ ] Follow up on stale tickets
            - [ ] Close confirmed resolutions
            - [ ] **After 8 days unresolved** → tag student, link prior answer, request new @help if still stuck, close ticket

            ## End
            - [ ] Tag coordinator with any tickets needing admin/escalation

            ---

            ### Session Notes
            _Tickets handled, escalations, patterns noticed_`
            });
